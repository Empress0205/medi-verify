name: mediverify
description: AI-Powered Medicine Authentication App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  fl_chart: ^0.66.0
  image_picker: ^0.8.7   # updated to stable recent version
  mobile_scanner: ^3.5.6
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  smooth_page_indicator: ^1.1.0
  provider: ^6.1.1
  uuid: ^4.3.3
  permission_handler: ^11.3.0
  camera: ^0.10.0+1       # <-- ADD THIS
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/