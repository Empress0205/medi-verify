# Render Blueprint — one-click deploy of the MediGuard backend + Postgres.
# In Render: New → Blueprint → connect this repo. It reads this file.
# You then set the two "sync: false" secrets in the dashboard (see docs/DEPLOY.md).

services:
  - type: web
    name: mediguard-api
    runtime: docker
    plan: free
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Use the real Gemini engine in production.
      - key: ENGINE
        value: gemini
      # Secret — paste your Google AI Studio key in the Render dashboard.
      - key: GEMINI_API_KEY
        sync: false
      # JWT signing secret — Render generates a strong random value.
      - key: SECRET_KEY
        generateValue: true
      # Change the seeded admin password — set it in the Render dashboard.
      - key: ADMIN_PASSWORD
        sync: false
      # Postgres connection string, injected from the database below.
      - key: DATABASE_URL
        fromDatabase:
          name: mediguard-db
          property: connectionString

  # ── Admin dashboard (static site) ───────────────────────────────────────────
  # Reviewers triage the reports submitted from the mobile app here. Without it
  # reports land in the database and no human ever sees them.
  - type: web
    name: mediguard-dashboard
    runtime: static
    rootDir: apps/dashboard
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Vite inlines this at BUILD time, so it must be present during the build.
      - key: VITE_API_BASE_URL
        value: https://mediguard-api-smlx.onrender.com
    routes:
      # Single-page app: let the client router handle unknown paths.
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mediguard-db
    plan: free            # NOTE: Render's free Postgres is deleted after ~30 days
