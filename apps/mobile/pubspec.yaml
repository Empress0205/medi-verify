name: mediverify
description: AI-Powered Medicine Authentication App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  fl_chart: ^0.66.0
  image_picker: ^1.1.2   # modern Android photo picker (0.8 didn't open on new Android)
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  smooth_page_indicator: ^1.1.0
  provider: ^6.1.1
  uuid: ^4.3.3
  permission_handler: ^11.3.0
  camera: ^0.11.0+2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# App launcher icon — generated from the vector logo PNGs written by
# tool/gen_app_icon.dart. Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#00A878"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  remove_alpha_ios: true